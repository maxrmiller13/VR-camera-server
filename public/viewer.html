<!DOCTYPE html>
<html>
    <head>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                background: #000;
                overflow: hidden;
            }

            /* Full-viewport video — letterboxed so aspect ratio is preserved */
            #video {
                width: 100vw;
                height: 100vh;
                object-fit: contain;
                display: block;
            }

            /* XR canvas sits on top of the video when VR mode is active */
            #xrCanvas {
                position: fixed;
                top: 0; left: 0;
                width: 100vw;
                height: 100vh;
                display: none;
                pointer-events: none;
            }

            #controls {
                position: fixed;
                top: 12px;
                left: 12px;
                z-index: 10;
            }

            #controls button {
                padding: 8px 16px;
                font-size: 16px;
                cursor: pointer;
            }

            #status {
                position: fixed;
                bottom: 12px;
                left: 12px;
                z-index: 10;
                color: #9f9;
                font: 13px monospace;
                background: rgba(0,0,0,0.5);
                padding: 4px 8px;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <video id="video" muted autoplay playsinline></video>

        <div id="controls">
            <button onclick="startXR()">Start VR</button>
        </div>
        <div id="status">connecting…</div>

        <canvas id="xrCanvas"></canvas>

        <!--
          janus.js is the official Janus WebRTC JS client — copy it from the
          janus-gateway repo's html/demos folder (html/demos/janus.js) into
          ./public. It depends on the webrtc-adapter shim, loaded below from
          a CDN rather than vendored locally.
        -->
        <script src="https://cdn.jsdelivr.net/npm/webrtc-adapter@9/out/adapter.js"></script>
        <script src="/janus.js"></script>
        <script src="/viewer_connection.js"></script>
        <script src="/vr.js"></script>
    </body>
</html>
