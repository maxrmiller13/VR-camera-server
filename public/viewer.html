<!DOCTYPE html>
<html>
    <head>
        <style>
                html,body{
                margin:0;
                padding:0;
                overflow:hidden;
                }

                #xrCanvas{
                width:100vw;
                height:100vh;
                }
        </style>
    </head>
    <body>
        <h2>Viewer</h2>
        <button id="startVR">Start VR</button>
        <video id="video" autoplay playsinline style="display:show"></video>

        <canvas id="xrCanvas"></canvas>

        <script src="/socket.io/socket.io.js"></script>
        <script type="module" src="/viewer_connection.js"></script>
        <script type="module">
            import { WebXRVideoPlayer }
                from "./vr.js";

            const video = document.getElementById("video");

            document
                .getElementById("startVR")
                .addEventListener("click", async () => {

                    await video.play();

                    const player =
                        new WebXRVideoPlayer(video);

                    await player.start();
                });
            </script>
    </body>
</html>
